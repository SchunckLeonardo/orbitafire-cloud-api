name: Deploy Spring Boot Gradle to AWS Elastic Beanstalk

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Grant execute permission for Gradle
        run: chmod +x ./gradlew

      - name: Build application with Gradle
        run: ./gradlew clean bootJar -x test

      - name: Create deployment package
        run: |
          mkdir deploy
          cp build/libs/orbitafire-cloud-api.jar deploy/orbitafire-cloud-api.jar
          cp Procfile deploy/Procfile
          cd deploy
          zip -r ../orbitafire-cloud-api.zip .

      - name: Deploy to AWS Elastic Beanstalk
        uses: aws-actions/aws-elasticbeanstalk-deploy@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          region: ${{ secrets.AWS_REGION }}
          application_name: orbitafire-cloud-api
          environment_name: Orbitafire-cloud-api-env-1
          version_label: orbitafire-${{ github.sha }}
          deployment_package: orbitafire-cloud-api.zip